name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Type check
      run: npm run typecheck
      continue-on-error: true # Allow for now as we are cleaning up

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Build
      run: npm run build
